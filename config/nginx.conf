# Default server configuration

# ------------------------------------------------------------
# HTTP backend port 8082
# ------------------------------------------------------------

# Direct legacy access only:
# http://logibooks.sw.consulting:8082
# -> https://logibooks.sw.consulting:8083
server {
    listen 8082;
    listen [::]:8082;

    server_name logibooks.sw.consulting;

    return 301 https://logibooks.sw.consulting:8083$request_uri;
}

# Any other hostname, including lb.gtc.express.
# Do not redirect to :8083.
server {
    listen 8082 default_server;
    listen [::]:8082 default_server;

    server_name _;

    return 301 https://$host$request_uri;
}


# ------------------------------------------------------------
# HTTPS backend port 8083
# ------------------------------------------------------------

# Direct HTTPS access through the old hostname only.
# Traefik may also connect here internally; certificate verification is skipped.
server {
    listen 8083 ssl default_server;
    listen [::]:8083 ssl default_server;

    server_name logibooks.sw.consulting _;

    ssl_certificate /etc/nginx/certificate/s.crt;
    ssl_certificate_key /etc/nginx/certificate/s.key;

    root /var/www/logibooks;
    index index.html;

    location /downloads/ {
        alias /var/www/downloads/;
        autoindex off;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";

        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
